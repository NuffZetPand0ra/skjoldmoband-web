<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Skjoldmø — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="preconnect" href="https://unpkg.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg: oklch(0.155 0.012 66);
    --bg-2: oklch(0.185 0.014 64);
    --bg-3: oklch(0.255 0.016 62);
    --ink: oklch(0.93 0.022 84);
    --ink-2: oklch(0.80 0.020 82);
    --ink-3: oklch(0.62 0.018 80);
    --gold: oklch(0.80 0.12 78);
    --gold-2: oklch(0.87 0.085 85);
    --moss: oklch(0.76 0.10 138);
    --line: oklch(0.55 0.03 72 / 0.20);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:oklch(0.125 0.012 64)}
  ::selection{background:oklch(0.8 0.12 78 / .3)}
  .boot-shell{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:10px;
    color:oklch(0.80 0.020 82);
    font-family:'EB Garamond', Georgia, serif;
  }
  .boot-shell-title{
    font-family:'Cinzel',serif;
    font-size:clamp(24px,5vw,40px);
    letter-spacing:.08em;
    color:oklch(0.87 0.085 85);
  }
  .boot-shell-copy{font-size:15px;opacity:.9}
  code{font-family:ui-monospace,Menlo,monospace;font-size:.86em;color:var(--gold-2);background:oklch(0.8 0.12 78 / .1);padding:1px 5px;border-radius:4px}
</style>
</head>
<body>
<div id="root">
  <div class="boot-shell" aria-live="polite">
    <div class="boot-shell-title">SKJOLDMØ</div>
    <div class="boot-shell-copy">Loading admin...</div>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="/app/site-config.js"></script>
<script type="text/babel" src="/app/shared.jsx"></script>
<script type="text/babel" src="/app/admin.jsx"></script>

<script type="text/babel" data-presets="react">
  ReactDOM.createRoot(document.getElementById("root")).render(<Admin />);
</script>
</body>
</html>
